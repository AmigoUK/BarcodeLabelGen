server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Body size limit (covers XLS/CSV uploads up to ~10MB)
    client_max_body_size 12M;

    # Proxy API to Flask backend
    location /api/ {
        proxy_pass http://web:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA static files
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed assets. Vite fingerprints every JS/CSS chunk, so
    # these are safe to cache immutably — a new deploy ships new filenames.
    # (Placed before `location /` but regex locations take priority anyway.)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # index.html is the unhashed entrypoint that references the hashed
        # chunks. It MUST always be revalidated, otherwise a browser holding
        # a stale index.html after a deploy asks for chunk hashes that no
        # longer exist → "Failed to fetch dynamically imported module" and a
        # white screen. no-cache forces a conditional GET every navigation.
        add_header Cache-Control "no-cache" always;
        # add_header in a location block drops inherited server-level headers,
        # so re-declare the security headers here to keep them on the document.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
