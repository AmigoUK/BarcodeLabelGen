name: Release assets

# The connect-a-printer wizard (F38) links to
# releases/latest/download/<connector-binary>, so EVERY published release must
# carry all six connector binaries. Attaching them here removes the manual
# "remember to upload dist/*" step that broke v0.21.1.
on:
  release:
    types: [published]
  # Manual re-run for an existing release (e.g. after a workflow fix) —
  # upload is idempotent thanks to --clobber.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach binaries to (e.g. v0.21.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  connector-binaries:
    name: Build + attach connector binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: connector/go.mod
          cache-dependency-path: connector/go.sum

      - name: Cross-compile all targets
        run: ./build-all.sh
        working-directory: connector

      - name: Upload binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG" connector/dist/* --clobber
